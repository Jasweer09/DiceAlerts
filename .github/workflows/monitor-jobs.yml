name: Dice Job Monitor

on:
  schedule:
    - cron: '*/5 * * * *'

  workflow_dispatch:

  push:
    branches: [ main, master ]
    paths:
      - 'monitor.py'
      - 'scraper.py'
      - 'notifier.py'
      - 'filters.py'
      - 'config.py'
      - '.github/workflows/monitor-jobs.yml'

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_jobs.json
            metrics.json
          key: dice-monitor-state-${{ github.run_id }}
          restore-keys: |
            dice-monitor-state-

      - name: Run Dice Job Monitor
        id: run_monitor
        env:
          # Dice search parameters
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS || 'Data Analyst,Data Engineer,Business Intelligence Analyst,BI Analyst,BI Developer,Reporting Analyst,Analytics Engineer,CRM Analyst,Salesforce Analyst,Salesforce Administrator,CRM Administrator,Automation Analyst,RPA Developer,ETL Developer,Data Warehouse Engineer,Power BI Developer,Tableau Developer,Marketing Analyst,Operations Analyst,Product Analyst,Financial Data Analyst,SQL Analyst,Process Automation Analyst,HubSpot Analyst' }}
          SEARCH_LOCATION: ${{ secrets.SEARCH_LOCATION || 'United States' }}
          SEARCH_POSTED_DATE: ${{ secrets.SEARCH_POSTED_DATE || 'ONE' }}
          SEARCH_PAGE_SIZE: ${{ secrets.SEARCH_PAGE_SIZE || '20' }}

          # Timing
          RUN_EVERY_MINUTES: 5

          # Adaptive pagination
          ENABLE_ADAPTIVE_PAGINATION: ${{ secrets.ENABLE_ADAPTIVE_PAGINATION || 'true' }}
          HIGH_PRIORITY_KEYWORDS: ${{ secrets.HIGH_PRIORITY_KEYWORDS }}
          HIGH_PRIORITY_PAGES: ${{ secrets.HIGH_PRIORITY_PAGES || '3' }}
          NORMAL_PAGES: ${{ secrets.NORMAL_PAGES || '3' }}
          REQUEST_DELAY_SECONDS: ${{ secrets.REQUEST_DELAY_SECONDS || '3.0' }}

          # Search strategy permutations
          SEARCH_WORKPLACE_TYPES: ${{ secrets.SEARCH_WORKPLACE_TYPES || 'Remote,On-Site,Hybrid' }}
          SEARCH_EMPLOYMENT_TYPES: ${{ secrets.SEARCH_EMPLOYMENT_TYPES || '' }}
          MAX_CONCURRENT_REQUESTS: ${{ secrets.MAX_CONCURRENT_REQUESTS || '3' }}
          MAX_RETRIES: ${{ secrets.MAX_RETRIES || '3' }}

          # Discord notifications
          DISCORD_ENABLED: ${{ secrets.DISCORD_ENABLED || 'true' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          # Job filters
          TITLE_MUST_CONTAIN: ${{ secrets.TITLE_MUST_CONTAIN }}
          TITLE_EXCLUDE: ${{ secrets.TITLE_EXCLUDE || 'intern,internship' }}
          COMPANY_FILTER: ${{ secrets.COMPANY_FILTER }}
          COMPANY_EXCLUDE: ${{ secrets.COMPANY_EXCLUDE }}
          LOCATION_FILTER: ${{ secrets.LOCATION_FILTER }}

          # Data retention
          SEEN_JOBS_RETENTION_DAYS: ${{ secrets.SEEN_JOBS_RETENTION_DAYS || '30' }}
          METRICS_FILE: metrics.json
        run: |
          python monitor.py --once
        continue-on-error: true

      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            seen_jobs.json
            metrics.json
          key: dice-monitor-state-${{ github.run_id }}

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dice-monitor-logs-${{ github.run_number }}
          path: |
            *.log
            seen_jobs.json
            metrics.json
          retention-days: 7

      - name: Send failure alert
        if: steps.run_monitor.outcome == 'failure'
        env:
          DISCORD_ENABLED: ${{ secrets.DISCORD_ENABLED || 'true' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ALERT_ROLE_ID: ${{ secrets.DISCORD_ALERT_ROLE_ID }}
        run: |
          python -c "
          import os
          import requests
          from datetime import datetime

          webhook_url = os.getenv('DISCORD_WEBHOOK_URL')
          role_id = os.getenv('DISCORD_ALERT_ROLE_ID', '')

          if webhook_url and os.getenv('DISCORD_ENABLED', 'true').lower() in ('true', '1', 'yes'):
              embed = {
                  'title': '\U0001f6a8 GitHub Actions Workflow Failed',
                  'description': f'The Dice Job Monitor workflow has failed!\n\nRun #{os.getenv(\"GITHUB_RUN_NUMBER\")}\nRepository: {os.getenv(\"GITHUB_REPOSITORY\")}',
                  'color': 0x992D22,
                  'timestamp': datetime.utcnow().isoformat(),
                  'fields': [
                      {'name': 'Workflow', 'value': os.getenv('GITHUB_WORKFLOW', 'Unknown'), 'inline': True},
                      {'name': 'Branch', 'value': os.getenv('GITHUB_REF_NAME', 'Unknown'), 'inline': True},
                      {'name': 'Actor', 'value': os.getenv('GITHUB_ACTOR', 'Unknown'), 'inline': True}
                  ],
                  'footer': {'text': 'Dice Job Monitor v1.0'}
              }

              payload = {'embeds': [embed]}
              if role_id:
                  payload['content'] = f'<@&{role_id}> **CRITICAL: Workflow Failed**'

              try:
                  response = requests.post(webhook_url, json=payload, timeout=15)
                  if response.status_code in (200, 204):
                      print('Failure alert sent to Discord')
                  else:
                      print(f'Failed to send alert: HTTP {response.status_code}')
              except Exception as e:
                  print(f'Error sending alert: {e}')
          else:
              print('Discord alerts not configured - skipping alert')
          "

      - name: Check workflow health
        if: always()
        run: |
          if [ -f "metrics.json" ]; then
            echo "Metrics file exists - workflow is recording data"
          else
            echo "No metrics file found - this may be the first run"
          fi
